<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analyseur CV / ATS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --bg: oklch(97% 0.008 75);
    --ink: oklch(23% 0.014 75);
    --ink-soft: oklch(42% 0.014 75);
    --line: oklch(88% 0.012 75);
    --surface: oklch(99% 0.004 75);
    --accent: oklch(56% 0.135 45);
    --accent-ink: oklch(99% 0.01 75);
    --accent-tint: oklch(93% 0.03 45);
    --ok: oklch(48% 0.09 150);
    --ok-tint: oklch(94% 0.035 150);
    --bad: oklch(50% 0.13 25);
    --bad-tint: oklch(94% 0.03 25);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: oklch(19% 0.012 75);
      --ink: oklch(93% 0.008 75);
      --ink-soft: oklch(72% 0.012 75);
      --line: oklch(32% 0.014 75);
      --surface: oklch(23% 0.014 75);
      --accent: oklch(70% 0.13 45);
      --accent-ink: oklch(15% 0.01 75);
      --accent-tint: oklch(30% 0.05 45);
      --ok: oklch(72% 0.11 150);
      --ok-tint: oklch(27% 0.045 150);
      --bad: oklch(74% 0.13 25);
      --bad-tint: oklch(29% 0.05 25);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
  }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: 2rem;
    letter-spacing: -0.01em;
    margin: 0 0 0.35rem;
  }
  p.subtitle {
    color: var(--ink-soft);
    margin: 0 0 2.25rem;
    max-width: 60ch;
    font-size: 0.98rem;
  }

  .lang-toggle { display: inline-flex; margin-bottom: 2.5rem; border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem; gap: 0.15rem; }
  .lang-toggle input { position: absolute; opacity: 0; pointer-events: none; }
  .lang-toggle label {
    padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.85rem; cursor: pointer;
    color: var(--ink-soft); transition: background 0.2s ease, color 0.2s ease;
  }
  .lang-toggle input:checked + label { background: var(--accent); color: var(--accent-ink); }

  .field-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--ink-soft); font-weight: 600; margin-bottom: 0.6rem; display: block;
  }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-bottom: 2.5rem; }
  @media (max-width: 700px) { .columns { grid-template-columns: 1fr; gap: 2rem; } }

  textarea {
    width: 100%; min-height: 260px; font-family: inherit; font-size: 0.92rem;
    border: 1px solid var(--line); border-radius: 10px; padding: 0.75rem 0.85rem; resize: vertical;
    background: var(--surface); color: var(--ink);
  }
  textarea::placeholder { color: var(--ink-soft); opacity: 0.65; }
  textarea:focus, input[type="file"]:focus-visible {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint);
  }

  .toggle { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
  .toggle button {
    border: 1px solid var(--line); background: transparent; color: var(--ink-soft);
    padding: 0.3rem 0.8rem; border-radius: 999px; cursor: pointer; font-size: 0.8rem;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .toggle button.active { background: var(--accent-tint); color: var(--ink); border-color: transparent; font-weight: 600; }

  input[type="file"] {
    width: 100%; font-size: 0.85rem; color: var(--ink-soft);
    border: 1px dashed var(--line); border-radius: 10px; padding: 0.9rem; margin-top: 0.5rem;
  }

  .analyser-row { text-align: center; margin: 2.75rem 0; }
  button.primary {
    padding: 0.75rem 2.25rem; font-size: 0.95rem; font-weight: 600;
    background: var(--accent); color: var(--accent-ink); border: none; border-radius: 999px;
    cursor: pointer; transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.18s ease;
  }
  button.primary:hover:not(:disabled) { transform: translateY(-1px); }
  button.primary:disabled { opacity: 0.55; cursor: wait; }

  .error { color: var(--bad); text-align: center; font-size: 0.9rem; }

  .results { margin-top: 3rem; opacity: 0; transform: translateY(6px); }
  .results.visible { animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .results-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
  @media (max-width: 700px) { .results-columns { grid-template-columns: 1fr; gap: 2rem; } }

  .results h2 {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600; color: var(--ink-soft); margin: 0 0 0.9rem;
  }
  .results h2 .count { color: var(--ink); }

  .tag-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 0.45rem; }
  .tag-present, .tag-missing {
    display: inline-flex; align-items: baseline; gap: 0.35rem;
    padding: 0.32rem 0.7rem; border-radius: 999px; font-size: 0.85rem;
  }
  .tag-present { background: var(--ok-tint); color: var(--ok); }
  .tag-missing { background: var(--bad-tint); color: var(--bad); }
  .tag-type { opacity: 0.7; font-size: 0.72rem; }
</style>
</head>
<body>
  <h1>Analyseur CV / ATS</h1>
  <p class="subtitle">Compare une offre d'emploi et un CV, repère les mots-clés attendus par les ATS.</p>

  <div class="lang-toggle">
    <input type="radio" name="lang" value="fr" id="lang-fr" checked>
    <label for="lang-fr">Français · ROME</label>
    <input type="radio" name="lang" value="en" id="lang-en">
    <label for="lang-en">Anglais · ESCO</label>
  </div>

  <div class="columns">
    <div>
      <span class="field-label">Offre d'emploi</span>
      <textarea id="offre_text" placeholder="Colle ici le texte de l'annonce..."></textarea>
    </div>
    <div>
      <span class="field-label">CV</span>
      <div class="toggle">
        <button type="button" id="btn-cv-text" class="active">Coller le texte</button>
        <button type="button" id="btn-cv-pdf">Importer un PDF</button>
      </div>
      <textarea id="cv_text" placeholder="Colle ici le texte de ton CV..."></textarea>
      <input type="file" id="cv_file" accept="application/pdf" style="display:none;">
    </div>
  </div>

  <div class="analyser-row">
    <button class="primary" id="btn-analyser">Analyser</button>
  </div>
  <p id="error" class="error" style="display:none;"></p>

  <div class="results" id="results" style="display:none;">
    <div class="results-columns">
      <div>
        <h2>Présents dans le CV (<span class="count" id="count-presents"></span>)</h2>
        <ul class="tag-list" id="list-presents"></ul>
      </div>
      <div>
        <h2>Manquants (<span class="count" id="count-manquants"></span>)</h2>
        <ul class="tag-list" id="list-manquants"></ul>
      </div>
    </div>
  </div>

<script>
const btnCvText = document.getElementById('btn-cv-text');
const btnCvPdf = document.getElementById('btn-cv-pdf');
const cvTextArea = document.getElementById('cv_text');
const cvFileInput = document.getElementById('cv_file');

btnCvText.addEventListener('click', () => {
  btnCvText.classList.add('active');
  btnCvPdf.classList.remove('active');
  cvTextArea.style.display = 'block';
  cvFileInput.style.display = 'none';
});
btnCvPdf.addEventListener('click', () => {
  btnCvPdf.classList.add('active');
  btnCvText.classList.remove('active');
  cvTextArea.style.display = 'none';
  cvFileInput.style.display = 'block';
});

function renderTag(m) {
  const li = document.createElement('li');
  li.className = m._className;
  li.innerHTML = `${m.label} <span class="tag-type">(${m.type})</span>`;
  return li;
}

document.getElementById('btn-analyser').addEventListener('click', async () => {
  const errorEl = document.getElementById('error');
  const resultsEl = document.getElementById('results');
  const btn = document.getElementById('btn-analyser');
  errorEl.style.display = 'none';
  resultsEl.style.display = 'none';
  resultsEl.classList.remove('visible');

  const lang = document.querySelector('input[name="lang"]:checked').value;
  const offreText = document.getElementById('offre_text').value.trim();
  const usingPdf = btnCvPdf.classList.contains('active');

  if (!offreText) {
    errorEl.textContent = "Le texte de l'annonce est vide.";
    errorEl.style.display = 'block';
    return;
  }
  if (usingPdf && !cvFileInput.files.length) {
    errorEl.textContent = "Choisis un fichier PDF pour le CV.";
    errorEl.style.display = 'block';
    return;
  }
  if (!usingPdf && !cvTextArea.value.trim()) {
    errorEl.textContent = "Le texte du CV est vide.";
    errorEl.style.display = 'block';
    return;
  }

  const formData = new FormData();
  formData.append('lang', lang);
  formData.append('offre_text', offreText);
  if (usingPdf) {
    formData.append('cv_file', cvFileInput.files[0]);
  } else {
    formData.append('cv_text', cvTextArea.value.trim());
  }

  btn.disabled = true;
  btn.textContent = 'Analyse en cours...';
  try {
    const resp = await fetch('/analyser', { method: 'POST', body: formData });
    const data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.erreur || 'Erreur inconnue');
    }

    const listPresents = document.getElementById('list-presents');
    const listManquants = document.getElementById('list-manquants');
    listPresents.innerHTML = '';
    listManquants.innerHTML = '';

    data.presents.forEach(m => { m._className = 'tag-present'; listPresents.appendChild(renderTag(m)); });
    data.manquants.forEach(m => { m._className = 'tag-missing'; listManquants.appendChild(renderTag(m)); });

    document.getElementById('count-presents').textContent = data.presents.length;
    document.getElementById('count-manquants').textContent = data.manquants.length;
    resultsEl.style.display = 'block';
    requestAnimationFrame(() => resultsEl.classList.add('visible'));
  } catch (e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyser';
  }
});
</script>
</body>
</html>
